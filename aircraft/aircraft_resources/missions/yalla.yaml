steps:
  - action: takeoff
    params:
      takeoff_altitude: 40.0
      vtol_transition_heading: 330.0
      vtol_loiter_nord: 100.0
      vtol_loiter_east: 100.0
      vtol_loiter_alt: 80.0

  - action: wait
    params:
      duration: 5.0
      
  - action: orbit
    params:
      east: 30.0
      north: 150.0
      altitude: 90.0
      radius: 40.0
      
  - action: wait
    params:
      duration: 60.0
      
  - action: land
    params:
      landing_altitude: 40.0
      vtol_transition_heading: 60.0
